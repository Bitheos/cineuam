{% extends 'base.html' %}
{% block title %}Nueva Reserva - CineUAM{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-ticket-perforated"></i> Nueva Reserva</h4>
            </div>
            <div class="card-body">
                <div id="alert-container"></div>
                <form id="form-reserva">
                    <div class="mb-3">
                        <label class="form-label">Función <span class="text-danger">*</span></label>
                        <select class="form-select" id="funcion_id" required>
                            <option value="">-- Seleccionar función --</option>
                            {% for funcion in funciones %}
                            <option value="{{ funcion.id }}" data-disponibles="{{ funcion.asientos_disponibles() }}">
                                {{ funcion.pelicula.titulo }} - {{ funcion.sala.nombre }} -
                                {{ funcion.fecha_hora.strftime('%d/%m/%Y %H:%M') }}
                                ({{ funcion.asientos_disponibles() }} disponibles)
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div id="info-asientos" class="alert alert-info d-none">
                        <i class="bi bi-info-circle"></i> Asientos disponibles: <strong id="num-disponibles">0</strong>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre del Cliente <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nombre_cliente" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email del Cliente <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email_cliente" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cantidad de Asientos <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="cantidad_asientos" required min="1">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-save"></i> Reservar
                        </button>
                        <a href="/reservas" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('funcion_id').addEventListener('change', function() {
    const option = this.options[this.selectedIndex];
    const disponibles = option.dataset.disponibles;
    if (this.value && disponibles !== undefined) {
        document.getElementById('info-asientos').classList.remove('d-none');
        document.getElementById('num-disponibles').textContent = disponibles;
        document.getElementById('cantidad_asientos').max = disponibles;
    } else {
        document.getElementById('info-asientos').classList.add('d-none');
    }
});

document.getElementById('form-reserva').addEventListener('submit', function(e) {
    e.preventDefault();
    const data = {
        funcion_id: parseInt(document.getElementById('funcion_id').value),
        nombre_cliente: document.getElementById('nombre_cliente').value,
        email_cliente: document.getElementById('email_cliente').value,
        cantidad_asientos: parseInt(document.getElementById('cantidad_asientos').value)
    };
    fetch('/api/reservas', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json().then(d => ({status: r.status, data: d})))
    .then(({status, data}) => {
        if (status === 201) {
            alert(`Reserva creada exitosamente. Código: ${data.codigo_reserva}`);
            window.location.href = '/reservas';
        } else {
            mostrarAlerta('danger', data.error || 'Error al crear la reserva.');
        }
    })
    .catch(() => mostrarAlerta('danger', 'Error de conexión.'));
});
</script>
{% endblock %}
