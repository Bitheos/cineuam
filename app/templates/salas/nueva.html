{% extends 'base.html' %}
{% block title %}Nueva Sala - CineUAM{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Nueva Sala</h4>
            </div>
            <div class="card-body">
                <div id="alert-container"></div>
                <form id="form-sala">
                    <div class="mb-3">
                        <label class="form-label">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nombre" required placeholder="Ej: Sala 1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Capacidad <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="capacidad" required min="1" placeholder="Número de asientos">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" id="tipo">
                            <option value="">-- Seleccionar --</option>
                            <option>2D</option>
                            <option>3D</option>
                            <option>IMAX</option>
                            <option>4DX</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i> Guardar
                        </button>
                        <a href="/salas" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('form-sala').addEventListener('submit', function(e) {
    e.preventDefault();
    const data = {
        nombre: document.getElementById('nombre').value,
        capacidad: parseInt(document.getElementById('capacidad').value),
        tipo: document.getElementById('tipo').value || null
    };
    fetch('/api/salas', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json().then(d => ({status: r.status, data: d})))
    .then(({status, data}) => {
        if (status === 201) {
            window.location.href = '/salas';
        } else {
            mostrarAlerta('danger', data.error || 'Error al crear la sala.');
        }
    })
    .catch(() => mostrarAlerta('danger', 'Error de conexión.'));
});
</script>
{% endblock %}
